<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeal Verification</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; -webkit-font-smoothing: antialiased;">
    
    <!-- Outer wrapping table for email client background coloring -->
    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #f8fafc; padding: 60px 20px;">
        <tr>
            <td align="center">
                
                <!-- Main Content Container -->
                <table border="0" cellspacing="0" cellpadding="0" style="width: 100%; max-width: 420px; background-color: #ffffff; border-radius: 24px; padding: 48px 32px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); border: 1px solid #e2e8f0;">
                    
                    <!-- Branding Z Logo -->
                    <tr>
                        <td align="center" style="padding-bottom: 24px;">
                            <table border="0" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td align="center" valign="middle" style="width: 64px; height: 64px; background-color: #10b981; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);">
                                        <span style="color: #ffffff; font-size: 32px; font-weight: 900; letter-spacing: -1px; mso-line-height-rule: exactly; line-height: 64px;">Z</span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Header -->
                    <tr>
                        <td align="center" style="padding-bottom: 12px;">
                            <h1 style="margin: 0; font-size: 28px; font-weight: 900; color: #020617; letter-spacing: -0.5px;">Sign in to Zeal</h1>
                        </td>
                    </tr>
                    
                    <!-- Sub-text -->
                    <tr>
                        <td align="center" style="padding-bottom: 36px;">
                            <p style="margin: 0; font-size: 14px; font-weight: 500; color: #64748b; line-height: 1.6;">
                                Enter the verification code below to seamlessly resume your plan.
                            </p>
                        </td>
                    </tr>
                    
                    <!-- 6-Digit OTP Block -->
                    <tr>
                        <td align="center" style="padding-bottom: 36px;">
                            <table border="0" cellspacing="0" cellpadding="0" style="background-color: #f1f5f9; border-radius: 16px; padding: 16px 24px;">
                                <tr>
                                    <td align="center">
                                        <span style="font-size: 36px; font-weight: 900; color: #020617; letter-spacing: 12px; font-family: 'Courier New', Courier, monospace;">{{ .Token }}</span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Alternative: Magic Link -->
                    <tr>
                        <td align="center" style="padding-bottom: 16px;">
                            <p style="margin: 0; font-size: 13px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;">Or authenticate instantly</p>
                        </td>
                    </tr>
                    <tr>
                        <td align="center">
                            <table border="0" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td align="center" style="border-radius: 14px; background-color: #ecfdf5;">
                                        <a href="{{ .ConfirmationURL }}" target="_blank" style="display: inline-block; padding: 14px 28px; font-size: 13px; font-weight: 900; color: #10b981; text-decoration: none; text-transform: uppercase; letter-spacing: 1.5px; border-radius: 14px;">Secure Web Link</a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer Warning -->
                    <tr>
                        <td align="center" style="padding-top: 48px;">
                            <p style="margin: 0; font-size: 12px; font-weight: 500; color: #cbd5e1; line-height: 1.5;">
                                If you didn't request this verification request, you can safely ignore this email.
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
